name: Release

# Triggered only when develop is merged into main.
# Reads the latest vX.Y.Z tag, bumps the right number based on commit messages
# since that tag, creates the new tag, and publishes a GitHub Release.
#
# Bump rules (first match wins):
#   BREAKING CHANGE in body  →  major  (v1.x.x → v2.0.0)
#   feat(...)                →  minor  (v1.0.x → v1.1.0)
#   fix(...) / default       →  patch  (v1.0.0 → v1.0.1)
on:
  push:
    branches: [main]

jobs:
  tag-and-release:
    name: Create tag & GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the tag and create the release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can read all tags and commits

      - name: Compute next version
        id: version
        run: |
          # Latest tag (default to v0.0.0 if none)
          LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          LATEST=${LATEST:-v0.0.0}
          echo "Latest tag: $LATEST"

          # Split into parts
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)

          # Read commits since last tag
          COMMITS=$(git log ${LATEST}..HEAD --pretty=format:"%s %b")

          # Decide bump type
          if echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0; BUMP=major
          elif echo "$COMMITS" | grep -qE "^feat(\(|:)"; then
            MINOR=$((MINOR + 1)); PATCH=0; BUMP=minor
          else
            PATCH=$((PATCH + 1)); BUMP=patch
          fi

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $NEXT ($BUMP bump)"
          echo "tag=$NEXT" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "previous=$LATEST" >> $GITHUB_OUTPUT

      - name: Generate changelog (commits since last tag)
        id: changelog
        run: |
          PREVIOUS="${{ steps.version.outputs.previous }}"
          LOG=$(git log ${PREVIOUS}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name: "${{ steps.version.outputs.tag }}",
              name:     "Release ${{ steps.version.outputs.tag }}",
              body: [
                "**Bump:** ${{ steps.version.outputs.bump }}",
                "**Previous:** ${{ steps.version.outputs.previous }}",
                "",
                "### Changements",
                `${{ steps.changelog.outputs.changelog }}`
              ].join("\n"),
              draft:      false,
              prerelease: false
            });
