name: tests

# Runs the deterministic suite (`npm test`) on every push/PR: needs Postgres but
# no OpenRouter key, since the live suites are excluded — so CI is reproducible
# without secrets or network flakiness.
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  deterministic:
    name: deterministic suite (npm test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: hr
          POSTGRES_PASSWORD: hr
          POSTGRES_DB: hr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hr -d hr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://hr:hr@localhost:5432/hr?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22" # matches the node:22 Docker base image
          cache: npm

      - run: npm ci

      # Object storage for the seed's KB cover uploads. MinIO needs a `server`
      # command arg, which the `services:` block can't supply — so run it as a
      # step. storage.ts defaults (minioadmin / us-east-1 / kb-images /
      # localhost:9000) already match, so no extra env is needed; the seed
      # creates the bucket via ensureBucket().
      - name: Start MinIO (object storage for seed covers)
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO ready"; exit 0
            fi
            sleep 1
          done
          echo "MinIO did not become ready in time" >&2; exit 1

      - name: Apply migrations + seed (handbook embedding self-skips without a key)
        run: |
          npm run db:deploy
          npm run db:seed

      - name: Build (Next.js)
        run: npm run build
        env:
          AUTH_SECRET: ci-secret-not-used

      - name: Deterministic tests (no OpenRouter key required)
        run: npm test
